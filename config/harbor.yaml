simulation:
  dt: 0.2
  horizon: 180
  guidance_update_interval_steps: 2
  goal_tolerance: 0.30
  coordination_distance: 3.0
  avoidance_gain: 2.8
  yielding_speed_scale: 0.40
  coordination_policy: eta_priority
  priority_response_scale: 0.2
  predict_delayed_messages: false
  world_x_bounds: [-5.0, 5.0]
  world_y_bounds: [-5.0, 5.0]
  shoreline_y: 3.0
  seabed_z: -4.0

communication:
  enabled: true
  range: 20.0
  update_interval_steps: 1
  delay_steps: 1
  message_ttl_steps: 12
  dropout_probability: 0.0
  seed: 7

platform_models:
  ugv:
    max_speed: 1.0
    max_acceleration: 1.0
    max_yaw_rate: 1.2
    ground_z: 0.0
  usv:
    max_speed: 0.9
    max_thrust: 1.5
    max_yaw_rate: 0.8
    drag: 0.25
    surface_z: 0.0
  rov:
    max_surge_speed: 0.75
    max_heave_speed: 0.4
    max_surge_force: 1.2
    max_heave_force: 0.8
    max_yaw_rate: 0.7
    surge_drag: 0.3
    heave_drag: 0.4

agents:
  - name: ground_rover
    kind: ugv
    start: [-4.0, 4.0, 0.0, 0.0]
    goal: [4.0, 4.0, 0.0]
    radius: 0.40
    domain:
      x: [-5.0, 5.0]
      y: [3.2, 4.8]
      z: [-0.05, 0.05]
  - name: surface_vessel
    kind: usv
    start: [0.0, -4.0, 1.5708, 0.0]
    goal: [0.0, 2.5, 0.0]
    radius: 0.50
    domain:
      x: [-5.0, 5.0]
      y: [-5.0, 3.0]
      z: [-0.05, 0.05]
  - name: underwater_rov
    kind: rov
    start: [-1.8, -2.0, -0.6, 0.0, 0.0, 0.0]
    goal: [4.0, -2.0, -0.6]
    radius: 0.35
    domain:
      x: [-5.0, 5.0]
      y: [-5.0, 3.0]
      z: [-4.0, -0.3]
