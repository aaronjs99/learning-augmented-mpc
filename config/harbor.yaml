  seeds: [11, 23, 37, 53, 71]
  effectiveness_min: 0.55
  effectiveness_max: 0.98
  bootstrap_samples: 5000

observation_noise:
  enabled: false
  seed: 101
  kind_state_std:
    # UGV: [x, y, yaw, forward speed, yaw rate]
    ugv: [0.01, 0.01, 0.005, 0.02, 0.01]
    # USV: [x, y, yaw, surge, sway, yaw rate]
    usv: [0.03, 0.03, 0.01, 0.03, 0.02, 0.01]
    # ROV: [x, y, z, roll, pitch, yaw, u, v, w, p, q, r]
    rov: [0.02, 0.02, 0.015, 0.008, 0.008, 0.01, 0.02, 0.02, 0.015, 0.008, 0.008, 0.008]

range_aided_slam:
  enabled: false
  # Baselines: known_anchor_ekf, joint_landmark_ekf, fixed_lag_slam.
  mode: joint_landmark_ekf
  fixed_lag: 8
  factor_iterations: 4
  robust_range_loss: huber
  range_std: 0.08
  range_bias: 0.0
  dropout_probability: 0.05
  nlos_probability: 0.0
  nlos_bias: 0.0
  outlier_probability: 0.0
  outlier_std: 1.0
  burst_dropout_probability: 0.0
  burst_dropout_steps: 0
  measurement_delay_steps: 0
  maximum_range: 20.0
  update_interval_steps: 1
  motion_std: [0.03, 0.03, 0.02]
  odometry_bias: [0.002, -0.001, 0.001]
  simulate_odometry_noise: true
  initial_pose_std: 0.5
  initial_landmark_std: 2.0
  observability_window: 20
  observability_rank_tolerance: 0.000001
  defer_landmarks_until_pose_observable: true
  landmark_pose_coupling_std: 0.01
  seed: 801
  beacons:
    - {name: quay_west, true_position: [-4.2, 4.8, 0.0], initial_position: [-4.2, 4.8, 0.0], fixed: true}
    - {name: quay_east, true_position: [4.2, 4.8, 0.0], initial_position: [4.2, 4.8, 0.0], fixed: true}
    - {name: harbor_mouth, true_position: [0.0, -4.5, 0.0], initial_position: [0.0, -4.5, 0.0], fixed: true}
    - {name: subsea_west, true_position: [-3.5, 0.5, -3.5], initial_position: [-2.8, 0.0, -3.0], fixed: false}
    - {name: subsea_east, true_position: [3.5, 0.5, -3.5], initial_position: [2.8, 0.0, -3.0], fixed: false}

