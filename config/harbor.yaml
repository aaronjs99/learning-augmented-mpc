simulation:
  dt: 0.2
  horizon: 180
  goal_hold_steps: 1
  guidance_update_interval_steps: 2
  goal_tolerance: 0.30
  orientation_tolerance: 0.15
  approach_speed_gain: 0.8
  coordination_distance: 3.0
  avoidance_gain: 0.5
  yielding_speed_scale: 0.40
  coordination_policy: eta_priority
  priority_response_scale: 0.2
  predict_delayed_messages: false
  world_x_bounds: [-5.0, 5.0]
  world_y_bounds: [-5.0, 5.8]
  shoreline_y: 3.0
  seabed_z: -4.0

communication:
  enabled: true
  range: 20.0
  update_interval_steps: 1
  delay_steps: 1
  message_ttl_steps: 12
  dropout_probability: 0.0
  seed: 7

disturbance_study:
  water_current: [-0.10, 0.0, 0.03]
  ugv_control_effectiveness: 0.92
  usv_control_effectiveness: 0.88
  rov_control_effectiveness: 0.88
  evaluation_hold_steps: 12

actuator_fault_study:
  water_current: [0.0, 0.0, 0.0]
  evaluation_hold_steps: 12
  agent_control_effectiveness:
    ground_rover_1: [0.68, 0.94]
    ground_rover_2: [0.90, 0.70]
    surface_vessel: [0.58, 0.93]
    underwater_rov: [0.84, 0.95, 0.62, 0.96, 0.72, 0.90, 0.86, 0.68]

actuator_fault_mpc:
  prediction_horizon: 15
  terminal_goal_weight: 500.0
  terminal_slack_bound: 2.0
  terminal_slack_weight: 500.0

actuator_fault_ensemble:
  seeds: [11, 23, 37, 53, 71]
  effectiveness_min: 0.55
  effectiveness_max: 0.98
  bootstrap_samples: 5000

harbor_mpc:
  prediction_horizon: 12
  replan_interval_steps: 1
  learning_iterations: 2
  terminal_samples: 8
  terminal_position_only: true
  seed_learning_from_mpc: true
  position_weight: 4.0
  orientation_weight: 0.8
  velocity_weight: 0.15
  control_weight: 0.04
  control_rate_weight: 0.25
  terminal_goal_weight: 250.0
  terminal_safe_cost_weight: 10.0
  terminal_slack_weight: 500.0
  terminal_slack_bound: 1.0
  collision_buffer: 0.12
  collision_slack_weight: 100000.0
  collision_slack_bound: 0.0
  residual_adaptation: false
  residual_estimator_gain: 0.35
  residual_max_speed: 0.35
  control_effectiveness_adaptation: false
  effectiveness_estimator_gain: 0.25
  effectiveness_min: 0.5
  effectiveness_max: 1.2
  effectiveness_excitation_threshold: 0.05
  active_identification: false
  identification_strategy: information
  identification_probe_fraction: 0.12
  identification_target_energy: 0.06
  identification_prior_std: 0.25
  identification_measurement_noise: 0.005
  identification_target_std: 0.15
  identification_fault_focus_weight: 2.0
  identification_probe_interval_steps: 1
  identification_min_probes_per_channel: 2
  identification_max_rejections: 2
  identification_clearance_buffer: 0.4
  ipopt_max_iter: 250
  ipopt_print_level: 0

